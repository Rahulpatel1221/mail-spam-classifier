{% extends "base.html" %}
{% block content %}
<h2>Compose</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    <input name="receiver" placeholder="To"><br><br>
    <input name="subject" placeholder="Subject"><br><br>
    <textarea name="message"></textarea><br><br>
    <button type="submit">Send</button>
</form>

{% endblock %}
